<!DOCTYPE html>
<html lang="en">


<head>

<title>Add Task</title>

<link rel="stylesheet" href="style.css">

</head>



<body>


<nav>

<h2>TaskMaster</h2>


<div>

<a href="dashboard.html">
Dashboard
</a>

<a href="tasks.html">
Tasks
</a>

</div>

</nav>




<div class="form-container">


<h2>Add New Task</h2>



<form id="taskForm">



<label>
Task Title
</label>


<input 
type="text"
id="taskTitle"
placeholder="Enter task name"
required>



<label>
Description
</label>


<input 
type="text"
id="taskDescription"
placeholder="Enter description">



<label>
Deadline
</label>


<input
type="date"
id="taskDeadline"
required>




<label>
Priority
</label>


<select id="taskPriority">


<option>
High
</option>


<option>
Medium
</option>


<option>
Low
</option>


</select>




<button type="submit">

Add Task

</button>



</form>



</div>



<script src="script.js"></script>


</body>

</html>
