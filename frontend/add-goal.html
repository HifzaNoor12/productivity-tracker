<!DOCTYPE html>
<html lang="en">


<head>

<title>Add Goal</title>

<link rel="stylesheet" href="style.css">

</head>



<body>


<nav>

<h2>TaskMaster</h2>


<div>

<a href="dashboard.html">
Dashboard
</a>

<a href="goals.html">
Goals
</a>

</div>


</nav>




<div class="form-container">


<h2>Create New Goal</h2>



<form id="goalForm">



<label>
Goal Title
</label>


<input
type="text"
id="goalTitle"
placeholder="Enter goal name"
required>




<label>
Description
</label>


<input
type="text"
id="goalDescription"
placeholder="Enter description">




<label>
Deadline
</label>


<input
type="date"
id="goalDeadline"
required>




<button type="submit">

Create Goal

</button>



</form>


</div>



<script src="script.js"></script>


</body>

</html>
